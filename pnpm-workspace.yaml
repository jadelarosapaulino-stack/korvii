packages:
  - "apps/*"

# pnpm 10/11 bloquea scripts de instalación no revisados.
# Se aprueban solo paquetes técnicos necesarios para binarios nativos/builds del stack.
# @scarf/scarf se marca como false porque no es requerido para compilar ni ejecutar el MVP.
allowBuilds:
  "@nestjs/core": true
  "@parcel/watcher": true
  "@scarf/scarf": false
  bcrypt: true
  esbuild: true
  lmdb: true
  "msgpackr-extract": true
  "unrs-resolver": true

strictDepBuilds: true
